<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @font-face {
    font-family: 'SF Pro Display';
    src: url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.3s ease;
  }

  body.dark-mode {
    background: #0a0e27;
  }

  body.light-mode {
    background: #f5f5f7;
  }

  .container {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .honolulu-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('honolulu_night.png') center/cover no-repeat;
    z-index: 0;
  }

  body.light-mode .honolulu-bg {
    opacity: 0.1;
  }

  body.dark-mode .honolulu-bg {
    opacity: 0.7;
  }

  .topbar {
    position: relative;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .topbar h1 {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
  }

  body.light-mode .topbar h1 {
    color: rgba(0, 0, 0, 0.8);
  }

  .topbar-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .theme-toggle {
    padding: 8px 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .theme-toggle:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  body.light-mode .theme-toggle {
    color: rgba(0, 0, 0, 0.7);
    border-color: rgba(0, 0, 0, 0.2);
    background: rgba(0, 0, 0, 0.05);
  }

  .body-content {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    gap: 15px;
    padding: 15px;
    height: calc(100vh - 70px);
    overflow: hidden;
  }

  .panel {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    padding: 25px;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  body.light-mode .panel {
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 15px;
  }

  body.light-mode .panel-title {
    color: rgba(0, 0, 0, 0.7);
  }

  /* TIMER PANEL - CENTER */
  .timer-panel {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .timer-glass {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 30px;
  }

  .timer-circle {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(135deg at 30% 30%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
      inset -2px -2px 5px rgba(0, 0, 0, 0.1),
      inset 2px 2px 5px rgba(255, 255, 255, 0.2),
      0 8px 32px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-display {
    text-align: center;
  }

  .timer-time {
    font-size: 84px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.95);
    font-family: 'Monaco', monospace;
    letter-spacing: 4px;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  body.light-mode .timer-time {
    color: rgba(0, 0, 0, 0.9);
  }

  .timer-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  body.light-mode .timer-label {
    color: rgba(0, 0, 0, 0.6);
  }

  .timer-progress {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  .timer-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #0096ff, #00d4ff);
    width: 100%;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  .timer-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .timer-btn {
    flex: 1;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: rgba(0, 150, 255, 0.7);
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s ease;
  }

  .timer-btn:hover {
    background: rgba(0, 120, 220, 0.9);
    transform: translateY(-2px);
  }

  .timer-btn.pause {
    background: rgba(255, 152, 0, 0.7);
  }

  .timer-btn.reset {
    background: rgba(239, 68, 68, 0.7);
  }

  .timer-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }

  .input-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .input-field label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 500;
  }

  body.light-mode .input-field label {
    color: rgba(0, 0, 0, 0.6);
  }

  .input-field input {
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.9);
    font-size: 14px;
  }

  body.light-mode .input-field input {
    background: rgba(255, 255, 255, 0.6);
    color: rgba(0, 0, 0, 0.9);
    border-color: rgba(0, 0, 0, 0.1);
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .preset-btn {
    padding: 10px;
    font-size: 11px;
    border: none;
    border-radius: 8px;
    background: rgba(0, 150, 255, 0.5);
    color: white;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    background: rgba(0, 150, 255, 0.7);
  }

  /* LEFT PANEL - TASKS & CALENDAR */
  .left-panel {
    grid-column: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .todo-section, .calendar-section {
    flex: 1;
  }

  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.9);
    font-size: 13px;
  }

  body.light-mode input[type="text"] {
    background: rgba(255, 255, 255, 0.7);
    border-color: rgba(0, 0, 0, 0.1);
    color: rgba(0, 0, 0, 0.9);
  }

  .input-group button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: rgba(0, 150, 255, 0.7);
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
  }

  body.light-mode .todo-item {
    background: rgba(255, 255, 255, 0.5);
    color: rgba(0, 0, 0, 0.8);
    border-color: rgba(0, 0, 0, 0.1);
  }

  .todo-item.completed {
    opacity: 0.5;
    text-decoration: line-through;
  }

  .todo-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .calendar-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 4px;
  }

  .calendar-month {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
  }

  body.light-mode .calendar-month {
    color: rgba(0, 0, 0, 0.8);
  }

  .calendar-nav {
    padding: 3px 6px;
    border: none;
    background: rgba(0, 150, 255, 0.5);
    color: white;
    border-radius: 3px;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .calendar-nav:hover {
    background: rgba(0, 150, 255, 0.7);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .calendar-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.6);
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    transition: all 0.2s;
  }

  .calendar-day:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .calendar-day.active {
    background: rgba(0, 150, 255, 0.6);
    color: white;
    font-weight: 600;
  }

  .calendar-day.today {
    border: 1px solid rgba(0, 150, 255, 0.8);
  }

  /* RIGHT PANEL - SOUNDS & ANALYTICS */
  .right-panel {
    grid-column: 3;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .analytics-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: rgba(0, 150, 255, 0.9);
    margin-bottom: 5px;
  }

  .stat-label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
  }

  body.light-mode .stat-label {
    color: rgba(0, 0, 0, 0.6);
  }

  .insight-text {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.5;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  body.light-mode .insight-text {
    color: rgba(0, 0, 0, 0.7);
  }

  .sound-control {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  body.light-mode .sound-control {
    background: rgba(255, 255, 255, 0.4);
    border-color: rgba(0, 0, 0, 0.1);
  }

  .sound-control input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .sound-label {
    flex: 1;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
  }

  body.light-mode .sound-label {
    color: rgba(0, 0, 0, 0.8);
  }

  input[type="range"] {
    flex: 0.4;
    height: 3px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.2);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(0, 150, 255, 0.8);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
  }

  /* SESSION NOTES MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
  }

  body.light-mode .modal-content {
    background: rgba(255, 255, 255, 0.8);
    border-color: rgba(0, 0, 0, 0.1);
  }

  .modal-title {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 15px;
  }

  body.light-mode .modal-title {
    color: rgba(0, 0, 0, 0.9);
  }

  .modal textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.9);
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 15px;
    resize: none;
  }

  body.light-mode .modal textarea {
    background: rgba(255, 255, 255, 0.6);
    border-color: rgba(0, 0, 0, 0.1);
    color: rgba(0, 0, 0, 0.9);
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
  }

  .modal-buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }

  .modal-buttons .save-btn {
    background: rgba(0, 150, 255, 0.7);
    color: white;
  }

  .modal-buttons .close-btn {
    background: rgba(239, 68, 68, 0.7);
    color: white;
  }

  .advice-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .advice-item {
    background: rgba(0, 150, 255, 0.15);
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.8);
    line-height: 1.4;
    border-left: 2px solid rgba(0, 150, 255, 0.6);
  }

  body.light-mode .advice-item {
    background: rgba(0, 150, 255, 0.1);
    color: rgba(0, 0, 0, 0.8);
  }

  .toast-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    padding: 14px 16px;
    max-width: 320px;
    color: rgba(0, 0, 0, 0.8);
    font-size: 12px;
    line-height: 1.5;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    z-index: 999;
    animation: slideInRight 0.3s ease-out forwards;
    pointer-events: none;
  }

  @keyframes slideInRight {
    from {
      opacity: 0;
      transform: translateX(350px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes slideOutRight {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(350px);
    }
  }

  .toast-notification.exit {
    animation: slideOutRight 0.3s ease-in forwards;
  }

  .toast-title {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 13px;
    color: rgba(0, 150, 255, 0.9);
  }

  .toast-message {
    color: rgba(0, 0, 0, 0.7);
    font-size: 12px;
    margin-bottom: 4px;
  }

  .toast-time {
    font-size: 10px;
    color: rgba(0, 0, 0, 0.5);
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.4);
  }
</style>
</head>
<body class="dark-mode">

<div class="container">
  <div class="honolulu-bg"></div>

  <!-- TOPBAR -->
  <div class="topbar">
    <h1>Focus Hub</h1>
    <div class="topbar-controls">
      <button class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="body-content">
    <!-- LEFT PANEL -->
    <div class="left-panel panel">
      <!-- TASKS -->
      <div class="todo-section">
        <h2 class="panel-title">Tasks</h2>
        <div class="input-group">
          <input type="text" id="todoInput" placeholder="Add task..." />
          <button onclick="addTodo()">Add</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>

      <!-- CALENDAR -->
      <div class="calendar-section">
        <h2 class="panel-title">Calendar</h2>
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="calendar-nav" onclick="prevMonth()">Prev</button>
            <span class="calendar-month" id="monthYear">March 2026</span>
            <button class="calendar-nav" onclick="nextMonth()">Next</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL - TIMER -->
    <div class="timer-panel panel">
      <div class="timer-progress">
        <div class="timer-progress-bar" id="progressBar"></div>
      </div>

      <div class="timer-glass">
        <div class="timer-circle">
          <div class="timer-display">
            <div class="timer-time" id="timerDisplay">25:00</div>
            <div class="timer-label" id="timerLabel">Work Session</div>
          </div>
        </div>
      </div>

      <div class="timer-inputs">
        <div class="input-field">
          <label>Work (min)</label>
          <input type="number" id="workTime" value="25" min="1" max="60" />
        </div>
        <div class="input-field">
          <label>Break (min)</label>
          <input type="number" id="breakTime" value="5" min="1" max="30" />
        </div>
      </div>

      <div class="timer-controls">
        <button class="timer-btn" onclick="startTimer()">Start</button>
        <button class="timer-btn pause" onclick="pauseTimer()">Pause</button>
        <button class="timer-btn reset" onclick="resetTimer()">Reset</button>
      </div>

      <div class="preset-grid">
        <button class="preset-btn" onclick="setPomodoroShort()">Short 15/3</button>
        <button class="preset-btn" onclick="setPomodoroStandard()">Standard 25/5</button>
        <button class="preset-btn" onclick="setPomodoroDev()">Dev 45/15</button>
        <button class="preset-btn" onclick="setPomodoroMarathon()">Marathon 60/10</button>
      </div>
    </div>

    <!-- RIGHT PANEL - SOUNDS & ANALYTICS -->
    <div class="right-panel panel">
      <!-- DAILY GOALS -->
      <div>
        <h2 class="panel-title">Daily Goal</h2>
        <div class="analytics-card">
          <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
              <div class="stat-value" id="completedPomodoros">0</div>
              <div class="stat-label">Completed Today</div>
            </div>
            <div style="flex: 1;">
              <div class="stat-value" id="dailyGoal">8</div>
              <div class="stat-label">Daily Goal</div>
            </div>
          </div>
          <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="number" id="goalInput" value="8" min="1" max="20" style="flex: 1; padding: 8px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: white;" />
            <button onclick="setDailyGoal()" style="padding: 8px 12px; background: rgba(0,150,255,0.7); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px;">Set</button>
          </div>
        </div>
      </div>

      <!-- ANALYTICS -->
      <div>
        <h2 class="panel-title">Analytics</h2>
        <div class="analytics-card">
          <div class="stat-value" id="totalMinutes">0</div>
          <div class="stat-label">Focus Minutes</div>
          <div class="insight-text" id="productivityInsight">Start a session to unlock insights</div>
        </div>
      </div>

      <!-- ADVICE BETA -->
      <div>
        <h2 class="panel-title">Advice for others (Beta)</h2>
        <div class="advice-container">
          <textarea id="adviceText" placeholder="Share your focus tips, motivation, or advice with others studying..." style="width: 100%; height: 80px; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.9); font-size: 12px; font-family: inherit; resize: none;"></textarea>
          <button onclick="postAdvice()" style="width: 100%; margin-top: 8px; padding: 10px; background: rgba(0,150,255,0.7); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;">Post Advice</button>
          <div id="adviceList" style="margin-top: 10px; max-height: 120px; overflow-y: auto;"></div>
        </div>
      </div>

      <!-- SOUNDS -->
      <div style="flex: 1; overflow-y: auto;">
        <h2 class="panel-title">Sounds</h2>
        
        <div class="sound-control">
          <input type="checkbox" id="soundToggle" onchange="toggleMaster()" checked />
          <label class="sound-label">Master</label>
          <input type="range" id="masterVolume" min="0" max="100" value="40" onchange="updateMaster()" />
        </div>

        <div style="margin-top: 10px;">
          <div class="sound-control">
            <input type="checkbox" id="rainSound" onchange="toggleSound('rain')" />
            <label class="sound-label">Rain</label>
          </div>
          <div style="margin-left: 28px; margin-top: 8px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 6px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
              <label class="sound-label" style="font-size: 11px; margin: 0;">Intensity</label>
              <span id="rainLevel" style="font-size: 11px; color: rgba(255,255,255,0.6);">30%</span>
            </div>
            <input type="range" id="rainSlider" min="0" max="100" value="30" onchange="updateRainLevel()" style="width: 100%;" />
          </div>
        </div>

        <div class="sound-control" style="margin-top: 10px;">
          <input type="checkbox" id="thunderSound" onchange="toggleSound('thunder')" />
          <label class="sound-label">Thunder</label>
        </div>

        <div class="sound-control" style="margin-top: 8px;">
          <input type="checkbox" id="stormSound" onchange="toggleSound('storm')" />
          <label class="sound-label">Storm</label>
        </div>

        <div class="sound-control" style="margin-top: 8px;">
          <input type="checkbox" id="cafeSound" onchange="toggleSound('cafe')" />
          <label class="sound-label">Cafe</label>
        </div>

        <div class="sound-control" style="margin-top: 8px;">
          <input type="checkbox" id="glassSound" onchange="toggleSound('glass')" />
          <label class="sound-label">Glass Chimes</label>
        </div>

        <div class="sound-control" style="margin-top: 8px;">
          <input type="checkbox" id="heavyThunderSound" onchange="toggleSound('heavyThunder')" />
          <label class="sound-label">Heavy Thunder</label>
        </div>
      </div>
    </right-panel>
  </div>
</div>

<!-- SESSION NOTES MODAL -->
<div class="modal" id="notesModal">
  <div class="modal-content">
    <h2 class="modal-title">Session Notes</h2>
    <p style="color: rgba(255,255,255,0.6); font-size: 12px; margin-bottom: 15px;">Add notes about your session</p>
    <textarea id="sessionNotes" placeholder="How was your focus? What did you accomplish?"></textarea>
    <div class="modal-buttons">
      <button class="save-btn" onclick="saveSessionNote()">Save</button>
      <button class="close-btn" onclick="closeNotesModal()">Skip</button>
    </div>
  </div>
</div>

<div class="footer">made by ruz ♥</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // Wait for supabase library to load
  let supabase;
  
  function initSupabase() {
    const SUPABASE_URL = 'https://gdmekfuyzkkldqwudkcb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_cJ2VeSNWE0gYYMMXL83KCg_yPO3i9bU';
    if (window.supabase) {
      const { createClient } = window.supabase;
      supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      console.log('Supabase initialized');
      loadAdviceFromSupabase();
      setupRealtimeListeners();
    } else {
      setTimeout(initSupabase, 100);
    }
  }
  let timerInterval = null;
  let timeLeft = 25 * 60;
  let totalTime = 25 * 60;
  let workMinutes = 25;
  let breakMinutes = 5;
  let isRunning = false;
  let isWorkSession = true;
  let todos = JSON.parse(localStorage.getItem('pomodoro_todos')) || [];
  let sessions = JSON.parse(localStorage.getItem('pomodoro_sessions')) || [];
  let dailyGoal = parseInt(localStorage.getItem('daily_goal')) || 8;
  let currentMonth = new Date();
  let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
  let communityAdvice = JSON.parse(localStorage.getItem('community_advice')) || [];

  const audioFiles = {
    rain: '5_Minutes_of_Rain_and_Thunderstorm_Sounds_For_Focus__Relaxing_and_Sleep__Epidemic_ASMR.mp3',
    thunder: '30_Minutes_of_Rain_and_Thunderstorm_Sounds_For_Focus__Relaxing_and_Sleep____Epidemic_ASMR_-_Overtone_Ambient__youtube_.mp3',
    storm: '30_Minutes_of_Rain_and_Thunderstorm_Sounds_For_Focus__Relaxing_and_Sleep____Epidemic_ASMR_-_Overtone_Ambient__youtube_.mp3',
    cafe: '10_minutes_of_People_Talking_in_Restaurant_Sound_Effect__Restaurant_Food_court_Ambiance_-_Sound_Effects_Lab__youtube_.mp3',
    glass: 'Wind_chimes_10_minutes_morning_meditation_-_Sound-and-Silence__youtube_.mp3',
    heavyThunder: '30_Minutes_of_Rain_and_Thunderstorm_Sounds_For_Focus__Relaxing_and_Sleep____Epidemic_ASMR_-_Overtone_Ambient__youtube_.mp3'
  };

  const soundStates = {
    rain: false,
    thunder: false,
    storm: false,
    cafe: false,
    glass: false,
    heavyThunder: false
  };

  const audioElements = {};

  function initializeAudio(sound) {
    if (audioElements[sound]) return;
    const audio = new Audio(audioFiles[sound]);
    audio.loop = true;
    audio.volume = 0.4;
    audioElements[sound] = audio;
  }

  function toggleTheme() {
    darkMode = !darkMode;
    document.body.classList.toggle('dark-mode');
    document.body.classList.toggle('light-mode');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
    document.querySelector('.theme-toggle').textContent = darkMode ? 'Light Mode' : 'Dark Mode';
  }

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timerDisplay').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    document.getElementById('timerLabel').textContent = isWorkSession ? 'Work Session' : 'Break Time';
    
    const progress = ((totalTime - timeLeft) / totalTime) * 100;
    document.getElementById('progressBar').style.width = progress + '%';
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    timerInterval = setInterval(() => {
      timeLeft--;
      updateDisplay();
      if (timeLeft === 0) {
        completeSession();
      }
    }, 1000);
  }

  function pauseTimer() {
    isRunning = false;
    clearInterval(timerInterval);
  }

  function resetTimer() {
    isRunning = false;
    clearInterval(timerInterval);
    isWorkSession = true;
    timeLeft = workMinutes * 60;
    totalTime = timeLeft;
    updateDisplay();
  }

  function completeSession() {
    clearInterval(timerInterval);
    isRunning = false;
    playNotification();

    if (isWorkSession) {
      const session = {
        date: new Date().toISOString(),
        duration: workMinutes,
        type: 'work'
      };
      sessions.push(session);
      localStorage.setItem('pomodoro_sessions', JSON.stringify(sessions));
      updateAnalytics();
      showNotesModal();
    }

    isWorkSession = !isWorkSession;
    timeLeft = isWorkSession ? workMinutes * 60 : breakMinutes * 60;
    totalTime = timeLeft;
    updateDisplay();
  }

  function playNotification() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.frequency.value = 800;
    env.gain.setValueAtTime(0.3, audioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  }

  function showNotesModal() {
    document.getElementById('notesModal').classList.add('active');
  }

  function closeNotesModal() {
    document.getElementById('notesModal').classList.remove('active');
    document.getElementById('sessionNotes').value = '';
  }

  function saveSessionNote() {
    const note = document.getElementById('sessionNotes').value;
    if (sessions.length > 0) {
      sessions[sessions.length - 1].note = note;
      localStorage.setItem('pomodoro_sessions', JSON.stringify(sessions));
    }
    closeNotesModal();
  }

  function updateAnalytics() {
    const today = new Date().toDateString();
    const todaySessions = sessions.filter(s => new Date(s.date).toDateString() === today && s.type === 'work');
    const completed = todaySessions.length;
    const totalMinutes = todaySessions.reduce((sum, s) => sum + s.duration, 0);

    document.getElementById('completedPomodoros').textContent = completed;
    document.getElementById('totalMinutes').textContent = totalMinutes;

    let insight = '';
    if (completed === 0) {
      insight = 'Start your first session to unlock insights';
    } else if (completed < dailyGoal * 0.5) {
      insight = 'Keep going! You are on your way. Try to reach your daily goal.';
    } else if (completed < dailyGoal) {
      insight = 'Almost there! Just a few more sessions to hit your daily goal.';
    } else {
      insight = 'Excellent focus today! You have exceeded your daily goal. Take a well-deserved break.';
    }
    document.getElementById('productivityInsight').textContent = insight;
  }

  function setDailyGoal() {
    dailyGoal = parseInt(document.getElementById('goalInput').value) || 8;
    localStorage.setItem('daily_goal', dailyGoal);
    document.getElementById('dailyGoal').textContent = dailyGoal;
    updateAnalytics();
  }

  function setPomodoroShort() {
    workMinutes = 15;
    breakMinutes = 3;
    document.getElementById('workTime').value = 15;
    document.getElementById('breakTime').value = 3;
    resetTimer();
  }

  function setPomodoroStandard() {
    workMinutes = 25;
    breakMinutes = 5;
    document.getElementById('workTime').value = 25;
    document.getElementById('breakTime').value = 5;
    resetTimer();
  }

  function setPomodoroDev() {
    workMinutes = 45;
    breakMinutes = 15;
    document.getElementById('workTime').value = 45;
    document.getElementById('breakTime').value = 15;
    resetTimer();
  }

  function setPomodoroMarathon() {
    workMinutes = 60;
    breakMinutes = 10;
    document.getElementById('workTime').value = 60;
    document.getElementById('breakTime').value = 10;
    resetTimer();
  }

  document.getElementById('workTime').addEventListener('change', () => {
    workMinutes = parseInt(document.getElementById('workTime').value);
    if (!isRunning) resetTimer();
  });

  document.getElementById('breakTime').addEventListener('change', () => {
    breakMinutes = parseInt(document.getElementById('breakTime').value);
  });

  async function postAdvice() {
    const adviceText = document.getElementById('adviceText').value.trim();
    console.log('Advice text:', adviceText);
    if (adviceText.length > 0) {
      try {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // Save to Supabase
        const { data, error } = await supabase
          .from('community_advice')
          .insert([
            {
              text: adviceText,
              timestamp: timestamp
            }
          ]);
        
        if (error) {
          console.error('Error saving advice:', error);
          alert('Error posting advice. Check console.');
        } else {
          console.log('Advice saved to Supabase:', data);
          document.getElementById('adviceText').value = '';
          showToastNotification(adviceText, timestamp);
          await loadAdviceFromSupabase();
        }
      } catch (err) {
        console.error('Exception:', err);
      }
    } else {
      console.log('Advice text is empty');
    }
  }

  async function loadAdviceFromSupabase() {
    try {
      const { data, error } = await supabase
        .from('community_advice')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(10);
      
      if (error) {
        console.error('Error loading advice:', error);
      } else {
        communityAdvice = data.map(item => ({
          text: item.text,
          timestamp: item.timestamp
        }));
        renderAdvice();
        console.log('Loaded advice from Supabase:', communityAdvice);
      }
    } catch (err) {
      console.error('Exception loading advice:', err);
    }
  }

  // Listen for real-time updates
  function setupRealtimeListeners() {
    const subscription = supabase
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'community_advice' }, payload => {
        console.log('New advice received:', payload.new);
        const newAdvice = {
          text: payload.new.text,
          timestamp: payload.new.timestamp
        };
        communityAdvice.unshift(newAdvice);
        if (communityAdvice.length > 10) communityAdvice.pop();
        renderAdvice();
        showToastNotification(newAdvice.text, newAdvice.timestamp);
      })
      .subscribe();
  }

  function showToastNotification(message, timestamp) {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `
      <div class="toast-title">Advice from Others</div>
      <div class="toast-message">${message}</div>
      <div class="toast-time">${timestamp}</div>
    `;
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.classList.add('exit');
      setTimeout(() => {
        toast.remove();
      }, 300);
    }, 3500);
  }

  function renderAdvice() {
    const list = document.getElementById('adviceList');
    list.innerHTML = communityAdvice.map(advice => `
      <div class="advice-item">
        <strong style="font-size: 10px; opacity: 0.7;">${advice.timestamp}</strong><br/>
        ${advice.text}
      </div>
    `).join('');
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    if (input.value.trim()) {
      todos.push({ text: input.value.trim(), completed: false });
      localStorage.setItem('pomodoro_todos', JSON.stringify(todos));
      renderTodos();
      input.value = '';
    }
  }

  function toggleTodo(index) {
    todos[index].completed = !todos[index].completed;
    localStorage.setItem('pomodoro_todos', JSON.stringify(todos));
    renderTodos();
  }

  function deleteTodo(index) {
    todos.splice(index, 1);
    localStorage.setItem('pomodoro_todos', JSON.stringify(todos));
    renderTodos();
  }

  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = todos.map((todo, idx) => `
      <div class="todo-item ${todo.completed ? 'completed' : ''}">
        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${idx})" />
        <span style="flex: 1;">${todo.text}</span>
        <button onclick="deleteTodo(${idx})" style="padding: 4px 8px; background: rgba(239,68,68,0.6); border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 10px;">Delete</button>
      </div>
    `).join('');
  }

  function renderCalendar() {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startingDayOfWeek = firstDay.getDay();
    
    document.getElementById('monthYear').textContent = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    
    let html = '';
    const weekDays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    weekDays.forEach(day => {
      html += `<div class="calendar-day" style="font-weight: 600; color: rgba(255,255,255,0.5); background: transparent; cursor: default;">${day}</div>`;
    });
    
    for (let i = 0; i < startingDayOfWeek; i++) {
      html += `<div class="calendar-day" style="opacity: 0; background: transparent; cursor: default;"></div>`;
    }
    
    const today = new Date();
    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month, day);
      const isToday = date.toDateString() === today.toDateString();
      html += `<div class="calendar-day ${isToday ? 'today active' : ''}">${day}</div>`;
    }
    
    document.getElementById('calendarGrid').innerHTML = html;
  }

  function prevMonth() {
    currentMonth.setMonth(currentMonth.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentMonth.setMonth(currentMonth.getMonth() + 1);
    renderCalendar();
  }

  function toggleSound(sound) {
    initializeAudio(sound);
    const audio = audioElements[sound];
    
    if (!soundStates[sound]) {
      soundStates[sound] = true;
      audio.currentTime = 0;
      audio.play().catch(e => console.log('Audio play error:', e));
      document.getElementById(sound + 'Sound').checked = true;
    } else {
      soundStates[sound] = false;
      audio.pause();
      document.getElementById(sound + 'Sound').checked = false;
    }
  }

  function updateRainLevel() {
    const level = document.getElementById('rainSlider').value;
    document.getElementById('rainLevel').textContent = level + '%';
    if (audioElements.rain) {
      const masterVol = parseFloat(document.getElementById('masterVolume').value) / 100;
      audioElements.rain.volume = (level / 100) * 0.4 * masterVol;
    }
  }

  function toggleMaster() {
    const isMuted = !document.getElementById('soundToggle').checked;
    const masterVol = parseFloat(document.getElementById('masterVolume').value) / 100;

    Object.keys(audioElements).forEach(sound => {
      if (audioElements[sound]) {
        audioElements[sound].volume = isMuted ? 0 : masterVol * 0.4;
      }
    });
  }

  function updateMaster() {
    const masterVol = parseFloat(document.getElementById('masterVolume').value) / 100;
    const isMuted = document.getElementById('soundToggle').checked;

    Object.keys(audioElements).forEach(sound => {
      if (audioElements[sound]) {
        audioElements[sound].volume = isMuted ? masterVol * 0.4 : 0;
      }
    });
  }

  if (!darkMode) {
    document.body.classList.remove('dark-mode');
    document.body.classList.add('light-mode');
  }

  // Wait for DOM to be fully loaded
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      renderTodos();
      renderCalendar();
      renderAdvice();
      updateDisplay();
      updateAnalytics();
      initSupabase();
    });
  } else {
    renderTodos();
    renderCalendar();
    renderAdvice();
    updateDisplay();
    updateAnalytics();
    initSupabase();
  }
</script>

</body>
</html>
